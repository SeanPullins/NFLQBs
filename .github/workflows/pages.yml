name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site/analysis/figures _site/assets _site/docs _site/model/artifacts
          cp .nojekyll index.html _site/
          cp assets/site.css assets/site.js _site/assets/
          cp analysis/findings.md _site/analysis/
          cp analysis/figures/*.png _site/analysis/figures/
          cp docs/*.md _site/docs/
          cp model/*.csv _site/model/
          cp model/artifacts/*.json _site/model/artifacts/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
